workflows:
  android-debug:
    name: Chess Alpha APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Install Gradle and build APK
        script: |
          cd $CM_BUILD_DIR
          curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          unzip -q gradle.zip
          export PATH=$CM_BUILD_DIR/gradle-8.2/bin:$PATH
          gradle assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - vrajdigitalmarketing18@gmail.com
        notify:
          success: true
          failure: true
